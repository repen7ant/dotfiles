[colors]
good     = #8a9a7b
degraded = #c0a36e
bad      = #c4746e
fg       = #c8c093
bg       = #181616
muted    = #717c7c
accent   = #7fb4ca

[bar/main]
tray-position = right
width            = 100%
height           = 24
background       = ${colors.bg}
foreground       = ${colors.fg}
font-0           = "Iosevka Nerd Font Propo:size=14;2"
padding-right    = 1
module-margin    = 1
separator        = /
separator-foreground = ${colors.muted}
modules-left   = i3 cmus
modules-center = date
modules-right  = volume disk wireless v2raya battery
cursor-click = pointer
enable-ipc   = true

[module/v2raya]
type = custom/script
exec = systemctl is-active --quiet v2raya && echo "%{F#957fb8}VPN%{F-} %{F#88b090}ON%{F-}" || echo "%{F#957fb8}VPN%{F-} %{F#e89393}OFF%{F-}"
interval = 2

; Левый клик — включить/выключить службу
click-left = ~/.config/polybar/v2raya-toggle.sh
; Правый клик — открыть веб-интерфейс в браузере по умолчанию
click-right = xdg-open http://127.0.0.1:2017/ &

[module/cmus]
type = custom/script
exec = ~/.config/polybar/cmus.sh
exec-if = pgrep -x cmus
interval = 1
click-left = cmus-remote --pause
click-right = cmus-remote --next
click-middle = cmus-remote --prev
scroll-up = cmus-remote --volume +5%
scroll-down = cmus-remote --volume -5%
format = <label>
label = %output%

[module/i3]
type            = internal/i3
format          = <label-state> <label-mode>
label-focused   = %index%
label-focused-foreground = ${colors.fg}
label-focused-background = ${colors.accent}
label-focused-padding    = 1
label-unfocused = %index%
label-unfocused-foreground = ${colors.fg}
label-unfocused-background = ${colors.bg}
label-unfocused-padding    = 1
label-visible   = %index%
label-visible-foreground = ${colors.muted}
label-visible-background = ${colors.bg}
label-visible-padding    = 1
label-urgent    = %index%
label-urgent-foreground = ${colors.fg}
label-urgent-background = ${colors.bad}
label-urgent-padding    = 1

[module/date]
type     = internal/date
interval = 1
date     = %a, %b %d
time     = %H:%M:%S
format          = <label>
format-foreground = ${colors.fg}
label    = %{F#957fb8}  %{F-}%date%  %{F#957fb8} %{F-}%time%

[module/volume]
type             = internal/pulseaudio
master-mixer     = Master
interval         = 1
format-volume    = <label-volume>
label-volume     = %{F#957fb8}󰕾%{F-} %percentage%%
format-muted     = <label-muted>
label-muted      = %{F#957fb8}󰖁%{F-} %{F#6c7086}%percentage%%%{F-}
label-muted-foreground = ${colors.fg}

[module/disk]
type            = internal/fs
mount-0         = /
interval        = 10
format-mounted  = <label-mounted>
    label-mounted   = %{F#957fb8}󰋊%{F-} %used%
label-unmounted =
warn-percentage = 80
label-warn = %{F#957fb8}󰋊%{F-} %{F#e89393}%used%%{F-}

[module/wireless]
type                     = internal/network
interface-type           = wireless
interval                 = 2
format-connected         = <label-connected>
label-connected          = %{F#957fb8}󰖩%{F-} %essid% %{F#88b090}%signal%%%{F-}
format-disconnected      = <label-disconnected>
label-disconnected       = %{F#957fb8}󰖪%{F-} %{F#e89393}Down%{F-}

[module/battery]
type                    = internal/battery
full-at                 = 99
low-at                  = 11
poll-interval           = 5
time-format             = %H:%M
format-charging         = <label-charging>
format-discharging      = <label-discharging>
format-full             = <label-full>
format-low              = <label-low>
label-charging          = %{F#957fb8}󰂄%{F-} %{F#ccdc90}%percentage%% %time%%{F-}
label-discharging       = %{F#957fb8}󰁹%{F-} %percentage%% %time%
label-full              = %{F#957fb8}󰁹%{F-} %{F#88b090}Full%{F-}
label-low               = %{F#957fb8}󰂃%{F-} %{F#e89393}%percentage%% %time%%{F-}
