#################################
#        Performance & Basics   #
#################################
backend = "xrender";
vsync = true;
detect-rounded-corners = true;
detect-client-opacity = true;
use-damage = true;

#################################
#          Animations           #
#################################
fading = true;
fade-delta = 4;                 # Smooth animation speed (ms)
fade-in-step = 0.03;            # Gentle fade-in
fade-out-step = 0.03;           # Gentle fade-out
inactive-opacity = 0.95;        # Base opacity for inactive windows
inactive-dim = 0.1;             # Subtle dimming effect

#################################
#          Shadows              #
#################################
shadow = true;
shadow-radius = 12;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.3;
shadow-color = "#1a1b26";       # Matches Alacritty background

#################################
#        Special Windows        #
#################################
wintypes: {
    tooltip = { fade = true; shadow = false; opacity = 0.9; };
    dock = { shadow = false; };
    desktop = { shadow = false; };
    notification = { fade = true; shadow = false; opacity = 1.0; };
};
